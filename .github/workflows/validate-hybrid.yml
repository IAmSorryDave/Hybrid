
name: Validate

on:
  push:
    branches:
      - Development
  pull_request:
    branches:
      - Development

jobs:
  build:
    name: validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"
            

    steps:
    
      - name: Checkout Project
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Initial Pytest
        run: uv run pytest

      - name: Run Ruff Formatter
        run: uv run ruff format --config pyproject.toml

      - name: Rerun Pytest
        run: uv run pytest

      - name: Run Ruff Linter
        run: uv run ruff check --config pyproject.toml --fix

      - name: Rerun Pytest Once More
        run: uv run pytest

      - name: Dry Run UV Bump
        run: uv version --bump major --dry-run
